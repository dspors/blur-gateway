<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blur Gateway Chat</title>
  <style>
    :root {
      color-scheme: light;
      --mono: 'SF Mono', 'Menlo', 'Fira Code', 'Cascadia Code', monospace;
      --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --bg: #F5F1EB;
      --surface: #F5F1EB;
      --surface2: #EDE8E1;
      --bg-card: #FFFFFF;
      --bg-hover: #EDE8E1;
      --border: #D9D2C9;
      --text: #2D2A26;
      --text-dim: #78736C;
      --text-bright: #1A1816;
      --accent: #C4652A;
      --accent-hover: #DA7756;
      --accent-dim: #A85420;
      --success: #5A8A4C;
      --error: #C44040;
      --warning: #B8860B;
      --chat-bg: #FAF8F5;
      --user-bg: #E3EDF7;
      --assistant-bg: #FAF8F5;
      --input-bg: #FFFFFF;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html {
      height: 100%;
      overflow: hidden;
    }
    body {
      height: 100dvh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      -webkit-text-size-adjust: 100%;
    }
    button, input, select, textarea {
      font: inherit;
      font-size: 13px;
    }
    button, select, input, textarea {
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--input-bg);
      color: var(--text);
    }
    button {
      min-height: 36px;
      padding: 0 12px;
      cursor: pointer;
    }
    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #FFFFFF;
      font-weight: 650;
    }
    button:disabled {
      cursor: not-allowed;
      opacity: .55;
    }
    label {
      display: block;
      margin: 0 0 6px;
      color: var(--text-dim);
      font-size: 11px;
      font-weight: 650;
      letter-spacing: 0;
      text-transform: uppercase;
    }
    input, select {
      width: 100%;
      height: 34px;
      padding: 0 10px;
    }
    textarea {
      width: 100%;
      height: 84px;
      min-height: 84px;
      max-height: 84px;
      resize: none;
      padding: 10px;
      line-height: 1.42;
    }
    .app {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
    }
    header {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) minmax(180px, 280px) auto auto;
      gap: 12px;
      align-items: end;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    main {
      display: grid;
      grid-template-columns: 320px 1fr;
      grid-template-rows: minmax(0, 1fr);
      min-height: 0;
      min-width: 0;
      overflow: hidden;
    }
    aside {
      display: flex;
      flex-direction: column;
      min-height: 0;
      min-width: 0;
      border-right: 1px solid var(--border);
      background: var(--surface);
      overflow: hidden;
    }
    .sidebar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .session-list {
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: auto;
      background: var(--border);
    }
    .session {
      display: grid;
      gap: 3px;
      padding: 10px 12px;
      border: 0;
      border-radius: 0;
      background: var(--surface);
      text-align: left;
    }
    .session.active {
      background: var(--surface2);
      outline: 2px solid var(--accent);
      outline-offset: -2px;
    }
    .session-title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 650;
      font-size: 13px;
      line-height: 1.25;
    }
    .session-meta {
      color: var(--text-dim);
      font-size: 11px;
      line-height: 1.25;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .session-state {
      color: var(--text-dim);
      font-size: 11px;
      line-height: 1.25;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .chat {
      display: grid;
      grid-template-rows: minmax(0, 1fr);
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      background: var(--chat-bg);
    }
    .messages {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 0;
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 18px;
      overscroll-behavior: contain;
    }
    .empty {
      margin: auto;
      color: var(--text-dim);
      text-align: center;
    }
    .bubble {
      max-width: min(860px, 86%);
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--assistant-bg);
      font-size: 13px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }
    .bubble .md {
      display: grid;
      gap: 8px;
    }
    .bubble .md p,
    .bubble .md ul,
    .bubble .md ol,
    .bubble .md pre {
      margin: 0;
    }
    .bubble .md ul,
    .bubble .md ol {
      padding-left: 18px;
    }
    .bubble .md code {
      font-family: var(--mono);
      font-size: 12px;
      background: var(--surface2);
      border-radius: 4px;
      padding: 1px 4px;
    }
    .bubble .md pre {
      overflow-x: auto;
      padding: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
    }
    .bubble .md pre code {
      padding: 0;
      background: transparent;
      border-radius: 0;
    }
    .bubble .md a {
      color: var(--accent);
      text-decoration: none;
    }
    .bubble .md a:hover {
      text-decoration: underline;
    }
    .bubble.user {
      align-self: flex-end;
      background: var(--user-bg);
      border-color: #C8D8E6;
    }
    .bubble.assistant {
      align-self: flex-start;
    }
    .bubble.status {
      align-self: center;
      max-width: 90%;
      color: var(--text-dim);
      background: var(--surface2);
      font-size: 12px;
      white-space: normal;
    }
    .bubble.error {
      border-color: var(--error);
      color: var(--error);
    }
    footer {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      padding: 12px 16px 16px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .composer-actions {
      display: grid;
      align-content: end;
      gap: 8px;
      min-width: 128px;
    }
    .status-line {
      color: var(--text-dim);
      font-size: 12px;
      min-height: 16px;
    }
    .hidden {
      display: none;
    }
    @media (max-width: 820px) {
      header {
        grid-template-columns: minmax(0, 1fr) minmax(120px, .55fr);
        gap: 8px;
        padding: 10px;
      }
      header > div:first-child {
        grid-column: 1 / -1;
      }
      header button {
        min-height: 34px;
      }
      main {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(116px, 30dvh) minmax(0, 1fr);
      }
      aside {
        max-height: none;
        border-right: 0;
        border-bottom: 1px solid var(--border);
      }
      .sidebar-head { padding: 8px 10px; }
      .session { padding: 8px 10px; }
      footer {
        grid-template-columns: 1fr auto;
        gap: 8px;
        padding: 10px;
      }
      textarea {
        height: 68px;
        min-height: 68px;
        max-height: 68px;
      }
      .composer-actions {
        min-width: 96px;
      }
      .bubble {
        max-width: 96%;
      }
    }
    @media (max-width: 520px) {
      header {
        grid-template-columns: 1fr 1fr;
      }
      header label,
      footer label {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0 0 0 0);
        white-space: nowrap;
      }
      footer {
        grid-template-columns: 1fr;
      }
      textarea {
        height: 58px;
        min-height: 58px;
        max-height: 58px;
      }
      .composer-actions {
        grid-template-columns: 1fr 1fr;
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <label for="endpoint">Endpoint</label>
        <input id="endpoint" list="endpoint-options" autocomplete="off">
        <datalist id="endpoint-options"></datalist>
      </div>
      <div>
        <label for="model">Model</label>
        <select id="model">
          <option value="codex-cli">codex-cli</option>
          <option value="codex-desktop">codex-desktop</option>
          <option value="claude-desktop">claude-desktop</option>
        </select>
      </div>
      <button id="connect">Refresh Sessions</button>
      <button id="new-session">New Session</button>
    </header>
    <main>
      <aside>
        <div class="sidebar-head">
          <strong>Sessions</strong>
          <span id="session-count" class="status-line"></span>
        </div>
        <div id="sessions" class="session-list"></div>
      </aside>
      <section class="chat">
        <div id="messages" class="messages">
          <div class="empty">Select a session or start a new one.</div>
        </div>
      </section>
    </main>
    <footer>
      <div>
        <label for="prompt">Prompt</label>
        <textarea id="prompt" placeholder="Type a message"></textarea>
        <div id="status" class="status-line"></div>
      </div>
      <div class="composer-actions">
        <button id="send" class="primary">Send</button>
        <button id="stop" disabled>Stop Poll</button>
      </div>
    </footer>
  </div>

  <script>
    const state = {
      endpoint: '',
      sessions: [],
      selected: null,
      highWaterMark: null,
      polling: null,
      messages: [],
      seenMessageKeys: new Set(),
    };

    const els = {
      endpoint: document.getElementById('endpoint'),
      endpointOptions: document.getElementById('endpoint-options'),
      model: document.getElementById('model'),
      connect: document.getElementById('connect'),
      newSession: document.getElementById('new-session'),
      sessions: document.getElementById('sessions'),
      sessionCount: document.getElementById('session-count'),
      messages: document.getElementById('messages'),
      prompt: document.getElementById('prompt'),
      status: document.getElementById('status'),
      send: document.getElementById('send'),
      stop: document.getElementById('stop'),
    };

    const defaultEndpoints = [
      window.location.origin,
      'http://100.75.53.74:3480',
      'http://100.104.75.123:3480',
      'http://100.111.143.111:3480',
    ];

    init();

    function init() {
      const saved = JSON.parse(localStorage.getItem('blurGatewayChat') || '{}');
      const endpoint = saved.endpoint || window.location.origin;
      els.endpoint.value = endpoint;
      els.model.value = saved.model || 'codex-cli';
      for (const value of Array.from(new Set([endpoint, ...defaultEndpoints]))) {
        const option = document.createElement('option');
        option.value = value;
        els.endpointOptions.appendChild(option);
      }
      els.connect.addEventListener('click', refreshSessions);
      els.newSession.addEventListener('click', selectNewSession);
      els.send.addEventListener('click', sendPrompt);
      els.stop.addEventListener('click', stopPolling);
      els.prompt.addEventListener('keydown', event => {
        if (event.key !== 'Enter') return;
        if (event.shiftKey) return;
        event.preventDefault();
        sendPrompt();
      });
      refreshSessions();
    }

    async function refreshSessions() {
      savePrefs();
      stopPolling();
      state.endpoint = cleanEndpoint(els.endpoint.value);
      setStatus('Loading sessions...');
      try {
        const data = await api('/v1/desktop/sessions');
        state.sessions = data.data || [];
        renderSessions();
        setStatus(`Connected to ${state.endpoint}`);
      } catch (err) {
        state.sessions = [];
        renderSessions();
        setStatus(err.message, true);
      }
    }

    function renderSessions() {
      els.sessions.textContent = '';
      els.sessionCount.textContent = `${state.sessions.length}`;
      if (!state.sessions.length) {
        const empty = document.createElement('div');
        empty.className = 'session-meta';
        empty.style.padding = '12px';
        empty.textContent = 'No gateway chains yet.';
        els.sessions.appendChild(empty);
        return;
      }
      for (const session of state.sessions) {
        const button = document.createElement('button');
        button.className = `session${state.selected?.id === session.id ? ' active' : ''}`;
        button.type = 'button';
        button.addEventListener('click', () => selectSession(session));
        const title = document.createElement('div');
        title.className = 'session-title';
        title.textContent = session.title || session.provider_session_title || session.id;
        const meta = document.createElement('div');
        meta.className = 'session-meta';
        meta.textContent = `${session.provider} · ${session.id}`;
        const sessionState = document.createElement('div');
        sessionState.className = 'session-state';
        sessionState.textContent = `${sessionStatus(session)} · ${jsonlAge(session.jsonl_updated_at)}`;
        button.append(title, meta, sessionState);
        els.sessions.appendChild(button);
      }
    }

    function selectSession(session) {
      stopPolling();
      state.selected = session;
      state.highWaterMark = null;
      state.messages = [];
      state.seenMessageKeys = new Set();
      els.model.value = session.model || session.provider || els.model.value;
      renderSessions();
      renderMessages();
      setStatus(`Selected ${session.title || session.id}`);
      pollResponse(session.id);
    }

    function selectNewSession() {
      stopPolling();
      state.selected = null;
      state.highWaterMark = null;
      state.messages = [];
      state.seenMessageKeys = new Set();
      renderSessions();
      renderMessages();
      setStatus('New session selected');
      els.prompt.focus();
    }

    async function sendPrompt() {
      const input = els.prompt.value.trim();
      if (!input) return;
      savePrefs();
      stopPolling();
      const previousResponseId = state.selected?.id || null;
      appendMessage({ id: `local:${Date.now()}:${Math.random().toString(16).slice(2)}`, role: 'user', text: input, local: true });
      els.prompt.value = '';
      setBusy(true);
      setStatus(previousResponseId ? 'Sending follow-up...' : 'Creating session...');
      try {
        const body = {
          model: els.model.value,
          input,
          metadata: { title: titleForPrompt(input), readback: 'messages' },
        };
        if (previousResponseId) body.previous_response_id = previousResponseId;
        if (state.highWaterMark) body.previous_response_high_water_mark = state.highWaterMark;
        const response = await api('/v1/responses', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify(body),
        });
        state.selected = {
          id: response.id,
          title: response.metadata?.desktop_title || response.id,
          provider: response.metadata?.provider || els.model.value,
          model: response.model,
        };
        state.highWaterMark = response.metadata?.message_high_water_mark || state.highWaterMark;
        renderSessions();
        pollResponse(response.id);
      } catch (err) {
        appendMessage({ role: 'error', text: err.message });
        setStatus(err.message, true);
        setBusy(false);
      }
    }

    async function pollResponse(id) {
      stopPolling();
      setBusy(true);
      let delay = 700;
      const tick = async () => {
        try {
          const params = new URLSearchParams({ readback: 'messages' });
          if (state.highWaterMark) params.set('high_water_mark', state.highWaterMark);
          const response = await api(`/v1/responses/${encodeURIComponent(id)}?${params}`);
          state.selected = {
            id: response.id,
            title: response.metadata?.desktop_title || state.selected?.title || response.id,
            provider: response.metadata?.provider || state.selected?.provider,
            model: response.model,
          };
          state.highWaterMark = response.metadata?.message_high_water_mark || state.highWaterMark;
          mergeResponse(response);
          renderSessions();
          setStatus(`${response.status}${state.highWaterMark ? ' · high-water advanced' : ''}`);
          if (response.status === 'completed' || response.status === 'failed') {
            setBusy(false);
            if (response.status === 'failed') appendMessage({ role: 'error', text: response.error?.message || 'Response failed' });
            await refreshSessionsQuietly();
            return;
          }
          delay = Math.min(delay + 300, 2200);
          state.polling = window.setTimeout(tick, delay);
        } catch (err) {
          appendMessage({ role: 'error', text: err.message });
          setStatus(err.message, true);
          setBusy(false);
        }
      };
      tick();
    }

    async function refreshSessionsQuietly() {
      try {
        const data = await api('/v1/desktop/sessions');
        state.sessions = data.data || [];
        renderSessions();
      } catch {
      }
    }

    function mergeResponse(response) {
      const messages = Array.isArray(response.blur_messages) && response.blur_messages.length
        ? response.blur_messages
        : response.output_text
          ? [{ role: 'assistant', text: response.output_text, id: `${response.id}:output` }]
          : [];
      for (const message of messages) {
        const role = message.role || message.type || 'assistant';
        if (role !== 'user' && role !== 'assistant') continue;
        const text = message.text || contentToText(message.content);
        if (role === 'user' && isHiddenProviderUserMessage(text)) continue;
        if (!text) continue;
        appendMessage({ id: message.id, role, text, timestamp: message.timestamp });
      }
    }

    function appendMessage(message) {
      const keys = messageKeys(message);
      if (keys.some(key => state.seenMessageKeys.has(key))) return;
      for (const key of keys) state.seenMessageKeys.add(key);
      state.messages.push({ ...message, id: message.id || keys[0] });
      renderMessages();
    }

    function messageKeys(message) {
      const text = (message.text || '').trim();
      const timestamp = message.timestamp || '';
      const keys = [];
      if (message.local) return [message.id || `local:${Date.now()}:${text}`];
      if (message.id) keys.push(`id:${message.id}`);
      if (timestamp) keys.push(`turn:${message.role}:${timestamp}:${text}`);
      if (!timestamp) keys.push(`text:${message.role}:${text}`);
      return keys;
    }

    function isHiddenProviderUserMessage(text) {
      return !text || /^<environment_context>[\s\S]*<\/environment_context>$/.test(text.trim());
    }

    function renderMessages() {
      els.messages.textContent = '';
      if (!state.messages.length) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = state.selected ? 'No messages returned yet.' : 'Select a session or start a new one.';
        els.messages.appendChild(empty);
        return;
      }
      for (const message of state.messages) {
        const bubble = document.createElement('div');
        bubble.className = `bubble ${message.role === 'user' ? 'user' : message.role === 'error' ? 'error' : 'assistant'}`;
        bubble.innerHTML = renderMarkdown(message.text);
        els.messages.appendChild(bubble);
      }
      els.messages.scrollTop = els.messages.scrollHeight;
    }

    function renderMarkdown(text) {
      const escaped = escapeHtml(text || '');
      const blocks = [];
      const lines = escaped.split('\n');
      let paragraph = [];
      let list = [];
      let inFence = false;
      let code = [];

      const flushParagraph = () => {
        if (!paragraph.length) return;
        blocks.push(`<p>${inlineMarkdown(paragraph.join(' '))}</p>`);
        paragraph = [];
      };
      const flushList = () => {
        if (!list.length) return;
        blocks.push(`<ul>${list.map(item => `<li>${inlineMarkdown(item)}</li>`).join('')}</ul>`);
        list = [];
      };
      const flushCode = () => {
        blocks.push(`<pre><code>${code.join('\n')}</code></pre>`);
        code = [];
      };

      for (const line of lines) {
        if (line.trim().startsWith('```')) {
          if (inFence) {
            flushCode();
            inFence = false;
          } else {
            flushParagraph();
            flushList();
            inFence = true;
          }
          continue;
        }
        if (inFence) {
          code.push(line);
          continue;
        }
        const bullet = line.match(/^\s*[-*]\s+(.+)$/);
        if (bullet) {
          flushParagraph();
          list.push(bullet[1]);
          continue;
        }
        if (!line.trim()) {
          flushParagraph();
          flushList();
          continue;
        }
        flushList();
        paragraph.push(line.trim());
      }
      if (inFence) flushCode();
      flushParagraph();
      flushList();
      return `<div class="md">${blocks.join('')}</div>`;
    }

    function inlineMarkdown(value) {
      return value
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\*([^*]+)\*/g, '<em>$1</em>')
        .replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function contentToText(content) {
      if (typeof content === 'string') return content;
      if (!Array.isArray(content)) return '';
      return content.map(part => {
        if (typeof part === 'string') return part;
        if (part && typeof part === 'object') return part.text || part.content || '';
        return '';
      }).filter(Boolean).join('\n');
    }

    async function api(path, options = {}) {
      const endpoint = cleanEndpoint(els.endpoint.value);
      const response = await fetch(`${endpoint}${path}`, options);
      const text = await response.text();
      const data = text ? JSON.parse(text) : null;
      if (!response.ok) throw new Error(data?.error?.message || `${response.status} ${response.statusText}`);
      return data;
    }

    function setBusy(busy) {
      els.send.disabled = busy;
      els.stop.disabled = !busy;
    }

    function stopPolling() {
      if (state.polling) window.clearTimeout(state.polling);
      state.polling = null;
      setBusy(false);
    }

    function setStatus(text, isError = false) {
      els.status.textContent = text;
      els.status.style.color = isError ? 'var(--error)' : 'var(--text-dim)';
    }

    function sessionStatus(session) {
      const raw = String(session.provider_status || session.status || '').trim();
      if (!raw) return 'Idle';
      if (/processing|in_progress/i.test(raw)) return 'Processing';
      if (/idle/i.test(raw)) return 'Idle';
      return raw;
    }

    function jsonlAge(value) {
      const ms = value ? Date.parse(value) : NaN;
      if (!Number.isFinite(ms)) return 'JSONL unknown';
      const ageMs = Math.max(0, Date.now() - ms);
      const seconds = Math.floor(ageMs / 1000);
      if (seconds < 10) return 'JSONL just now';
      if (seconds < 60) return `JSONL ${seconds}s ago`;
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return `JSONL ${minutes}m ago`;
      const hours = Math.floor(minutes / 60);
      if (hours < 48) return `JSONL ${hours}h ago`;
      const days = Math.floor(hours / 24);
      return `JSONL ${days}d ago`;
    }

    function savePrefs() {
      localStorage.setItem('blurGatewayChat', JSON.stringify({
        endpoint: cleanEndpoint(els.endpoint.value),
        model: els.model.value,
      }));
    }

    function cleanEndpoint(value) {
      return (value || window.location.origin).trim().replace(/\/$/, '');
    }

    function titleForPrompt(input) {
      return input.replace(/\s+/g, ' ').slice(0, 48) || 'Gateway Chat';
    }

    window.setInterval(() => {
      if (state.sessions.length) renderSessions();
    }, 30000);
  </script>
</body>
</html>
